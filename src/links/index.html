    <title>Links - A Clínica Oral</title>

      name="description"
      content="Acesse nossos principais canals de atendimento e saiba mais sobre A Clínica Oral."

    <link rel="preconnect" href="https://fonts.googleapis.com" />

    <!-- Favicon -->
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="../resources/img/favicon-32x32.png"
    />

    <style>
      :root {
        /* Paleta Oficial do Manual de Marca */
        --pantone-7534: #d9d5cf; /* Bege Claro: r:217 g:213 b:207 */
        --pantone-7535: #c5bfb4; /* Bege / Dourado: r:197 g:191 b:180 */
        --pantone-gray-4: #a7a9ac; /* Cinza Claro: r:167 g:169 b:172 */
        --pantone-gray-10: #636467; /* Cinza Escuro: r:99 g:100 b:103 */

        --bg-color: var(--pantone-7535);
        --button-bg: var(--pantone-7534);
        --text-color: var(--pantone-gray-10);
        --card-bg: #fff;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: 'Poppins', sans-serif;
        background-color: var(--bg-color);
        color: var(--text-color);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 40px 20px;
        background-image: radial-gradient(
          circle at top,
          var(--pantone-7534) 0%,
          var(--bg-color) 70%
        );
      }

      .profile-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        margin-bottom: 30px;
        text-align: center;
      }

      .logo-wrapper {
        width: 120px;
        height: 120px;
        background-color: transparent;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 20px;
        overflow: hidden;
      }

      /* Logo ajustada */
      .logo-wrapper img {
        width: 100%;
        height: auto;
        object-fit: contain;
      }

      .profile-name {
        font-size: 1.5rem;
        font-weight: 600;
        margin-bottom: 5px;
        letter-spacing: 0.5px;
        color: var(--text-color);
      }

      .profile-bio {
        font-size: 0.95rem;
        font-weight: 400;
        color: var(--text-color);
        opacity: 0.85; /* Cinza escuro com leve opacidade para ficar suave */
        max-width: 300px;
      }

      /* Container dos Links */
      .links-container {
        width: 100%;
        max-width: 600px;
        display: flex;
        flex-direction: column;
        gap: 16px;
      }

      .link-item {
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
        background-color: transparent;
        border: 2px solid var(--button-bg);
        color: var(--text-color);
        text-decoration: none;
        padding: 18px 20px;
        border-radius: 30px;
        font-weight: 500;
        font-size: 1rem;
        transition: all 0.3s ease;
        overflow: hidden;
      }

      .link-item:hover {
        background-color: var(--button-bg);
        color: var(--text-color);
        transform: translateY(-3px);
        box-shadow: 0 10px 20px rgba(153, 149, 142, 0.2);
      }

      .link-item i {
        position: absolute;
        left: 20px;
        font-size: 1.2rem;
      }

      /* Destaque para o Whatsapp (Pulse effect) */
      .link-highlight {
        background-color: var(--button-bg);
        border-color: var(--button-bg);
        color: var(--text-color);
        box-shadow: 0 4px 15px rgba(217, 213, 207, 0.4);
        animation: pulse 2s infinite;
      }

      @keyframes pulse {
        0% {
          box-shadow: 0 0 0 0 rgba(217, 213, 207, 0.6);
        }
        70% {
          box-shadow: 0 0 0 10px rgba(217, 213, 207, 0);
        }
        100% {
          box-shadow: 0 0 0 0 rgba(217, 213, 207, 0);
        }
      }

      .link-highlight:hover {
        background-color: #cac5be;
        border-color: #cac5be;
        color: var(--text-color);
      }

      /* Vídeo (incorporado no linktree) */
      .video-container {
        width: 100%;
        max-width: 600px;
        margin-top: 30px;
        border-radius: 16px;
        overflow: hidden;
        box-shadow: 0 15px 30px rgba(99, 100, 103, 0.15);
        border: 2px solid rgba(197, 191, 180, 0.4);
      }

      .video-wrapper {
        position: relative;
        padding-bottom: 56.25%; /* 16:9 aspect ratio */
        height: 0;
      }

      .video-wrapper iframe {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        border: 0;
      }

      .video-title {
        text-align: center;
        margin-top: 40px;
        margin-bottom: 15px;
        font-size: 1.1rem;
        font-weight: 500;
        color: var(--text-color);
        text-transform: uppercase;
        letter-spacing: 1px;
      }

      footer {
        margin-top: auto;
        padding-top: 50px;
        font-size: 0.8rem;
        color: var(--pantone-gray-4); /* Cinza claro da marca */
      }

      /* Responsive Ajustes */
      @media (max-width: 480px) {
        .link-item {
          padding: 16px;
          font-size: 0.95rem;
        }
        .link-item i {
          left: 15px;
        }
      }
    </style>
  </head>
  <body>
    <!-- Google Tag Manager (noscript) -->
    <noscript
      ><iframe
        src="https://www.googletagmanager.com/ns.html?id=GTM-NWVGZ4LM"
        height="0"
        width="0"
        style="display: none; visibility: hidden"
      ></iframe
    ></noscript>
    <!-- End Google Tag Manager (noscript) -->
    <!-- Perfil -->
    <div class="profile-container">
      <div class="logo-wrapper">
        <img
          src="../resources/img/logo_links_aclinica1.jpeg"
          alt="A Clínica Oral"
        />
      </div>
      <h1 class="profile-name">A Clínica Oral</h1>
      <p class="profile-bio">Odontologia de Excelência na Vila Olímpia</p>
    </div>

    <!-- Links -->
    <div class="links-container">
      <!-- 1. Agende sua consulta -->
      <a
        href="https://api.whatsapp.com/send?phone=5511988711774&text=Olá, gostaria de agendar uma consulta."
        class="link-item link-highlight"
        target="_blank"
      >
        <i class="fa-brands fa-whatsapp"></i>
        Agende a sua consulta
      </a>

      <!-- 3. Site -->
      <a href="https://aclinicaoral.com.br" class="link-item">
        <i class="fa-solid fa-globe"></i>
        Acesse nosso Site
      </a>
    </div>

    <!-- 2. Video Institucional (Embed para visualização direta) -->
    <!-- <h2 class="video-title"><i class="fa-solid fa-play"></i> Vídeo Institucional</h2> -->
    <div class="video-container">
      <div class="video-wrapper">
        <iframe
          src="https://www.youtube.com/embed/Umk9riWFHoQ"
          title="A Clínica Oral - Vídeo Institucional"
          frameborder="0"
          allow="
            accelerometer;
            autoplay;
            clipboard-write;
            encrypted-media;
            gyroscope;
            picture-in-picture;
            web-share;
          "
          allowfullscreen
        >
        </iframe>
      </div>
    </div>

    <footer>
      <p>&copy; 2026 A Clínica Oral. Todos os direitos reservados.</p>
    </footer>
