<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Links - A Clínica Oral</title>
    <meta name="description" content="Acesse nossos principais canals de atendimento e saiba mais sobre A Clínica Oral." />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.3.0/css/all.min.css" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="32x32" href="../resources/img/favicon-32x32.png" />

    <style>
      :root {
        --primary-color: #0b1a2e; /* Azul Escuro/Marinho do logo */
        --secondary-color: #b8926a; /* Dourado/Bege */
        --bg-color: #f4f7f6;
        --text-color: #333;
        --card-bg: #fff;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: 'Poppins', sans-serif;
        background-color: var(--primary-color);
        color: #fff;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 40px 20px;
        background-image: radial-gradient(circle at top, #152d4e 0%, var(--primary-color) 60%);
      }

      .profile-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        margin-bottom: 30px;
        text-align: center;
      }

      .logo-wrapper {
        width: 120px;
        height: 120px;
        background-color: transparent;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 20px;
        overflow: hidden;
      }

      /* Usando o logo branco que já temos no projeto */
      .logo-wrapper img {
        width: 100%;
        height: auto;
        object-fit: contain;
      }

      .profile-name {
        font-size: 1.5rem;
        font-weight: 600;
        margin-bottom: 5px;
        letter-spacing: 0.5px;
      }

      .profile-bio {
        font-size: 0.95rem;
        font-weight: 300;
        color: #ddd;
        max-width: 300px;
      }

      /* Container dos Links */
      .links-container {
        width: 100%;
        max-width: 600px;
        display: flex;
        flex-direction: column;
        gap: 16px;
      }

      .link-item {
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
        background-color: transparent;
        border: 2px solid var(--secondary-color);
        color: #fff;
        text-decoration: none;
        padding: 18px 20px;
        border-radius: 30px;
        font-weight: 500;
        font-size: 1rem;
        transition: all 0.3s ease;
        overflow: hidden;
      }

      .link-item:hover {
        background-color: var(--secondary-color);
        color: #fff;
        transform: translateY(-3px);
        box-shadow: 0 10px 20px rgba(184, 146, 106, 0.3);
      }

      .link-item i {
        position: absolute;
        left: 20px;
        font-size: 1.2rem;
      }

      /* Destaque para o Whatsapp (Pulse effect) */
      .link-highlight {
        background-color: var(--secondary-color);
        border-color: var(--secondary-color);
        box-shadow: 0 4px 15px rgba(184, 146, 106, 0.4);
        animation: pulse 2s infinite;
      }

      @keyframes pulse {
        0% {
          box-shadow: 0 0 0 0 rgba(184, 146, 106, 0.7);
        }
        70% {
          box-shadow: 0 0 0 10px rgba(184, 146, 106, 0);
        }
        100% {
          box-shadow: 0 0 0 0 rgba(184, 146, 106, 0);
        }
      }

      .link-highlight:hover {
        background-color: #d6b088;
        border-color: #d6b088;
      }

      /* Vídeo (incorporado no linktree) */
      .video-container {
        width: 100%;
        max-width: 600px;
        margin-top: 30px;
        border-radius: 16px;
        overflow: hidden;
        box-shadow: 0 15px 30px rgba(0, 0, 0, 0.3);
        border: 2px solid rgba(255, 255, 255, 0.1);
      }

      .video-wrapper {
        position: relative;
        padding-bottom: 56.25%; /* 16:9 aspect ratio */
        height: 0;
      }

      .video-wrapper iframe {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        border: 0;
      }

      .video-title {
        text-align: center;
        margin-top: 40px;
        margin-bottom: 15px;
        font-size: 1.1rem;
        font-weight: 500;
        color: var(--secondary-color);
        text-transform: uppercase;
        letter-spacing: 1px;
      }

      footer {
        margin-top: auto;
        padding-top: 50px;
        font-size: 0.8rem;
        color: rgba(255, 255, 255, 0.6);
      }

      /* Responsive Ajustes */
      @media (max-width: 480px) {
        .link-item {
          padding: 16px;
          font-size: 0.95rem;
        }
        .link-item i {
          left: 15px;
        }
      }
    </style>
  </head>
  <body>
    
    <!-- Perfil -->
    <div class="profile-container">
      <div class="logo-wrapper">
        <img src="../resources/img/logo_nova_branca.webp" alt="A Clínica Oral" />
      </div>
      <h1 class="profile-name">A Clínica Oral</h1>
      <p class="profile-bio">Odontologia de Excelência na Vila Olímpia</p>
    </div>

    <!-- Links -->
    <div class="links-container">
      <!-- 1. Agende sua consulta -->
      <a href="https://api.whatsapp.com/send?phone=5511988711774&text=Olá, gostaria de agendar uma consulta." class="link-item link-highlight" target="_blank">
        <i class="fa-brands fa-whatsapp"></i>
        Agende a sua consulta
      </a>

      <!-- 3. Site -->
      <a href="https://aclinicaoral.com.br" class="link-item">
        <i class="fa-solid fa-globe"></i>
        Acesse nosso Site
      </a>
    </div>

    <!-- 2. Video Institucional (Embed para visualização direta) -->
    <!-- <h2 class="video-title"><i class="fa-solid fa-play"></i> Vídeo Institucional</h2> -->
    <div class="video-container">
      <div class="video-wrapper">
        <iframe 
          src="https://www.youtube.com/embed/Umk9riWFHoQ" 
          title="A Clínica Oral - Vídeo Institucional" 
          frameborder="0" 
          allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
          allowfullscreen>
        </iframe>
      </div>
    </div>

    <footer>
      <p>&copy; 2026 A Clínica Oral. Todos os direitos reservados.</p>
    </footer>

  </body>
</html>
